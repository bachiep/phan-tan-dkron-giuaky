version: '3.8'

services:
  dkron-server-1:
    build:
      context: ./dkron
      dockerfile: Dockerfile
    command: >
      dkron agent --server 
      --bootstrap-expect=3 
      --node-name=server1 
      --join=dkron-server-1 
      --join=dkron-server-2 
      --join=dkron-server-3
    ports:
      - "8080:8080"
    networks:
      - dkron-net

  dkron-server-2:
    build:
      context: ./dkron
      dockerfile: Dockerfile
    command: >
      dkron agent --server 
      --bootstrap-expect=3 
      --node-name=server2 
      --join=dkron-server-1 
      --join=dkron-server-2 
      --join=dkron-server-3
    ports:
      - "8081:8080"
    networks:
      - dkron-net

  dkron-server-3:
    build:
      context: ./dkron
      dockerfile: Dockerfile
    command: >
      dkron agent --server 
      --bootstrap-expect=3 
      --node-name=server3 
      --join=dkron-server-1 
      --join=dkron-server-2 
      --join=dkron-server-3
    ports:
      - "8082:8080"
    networks:
      - dkron-net

networks:
  dkron-net:
